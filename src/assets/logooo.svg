<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi avec dégradé -->
  <rect x="10" y="10" width="180" height="180" rx="42" fill="url(#bgGrad)"/>

  <!-- Sac / panier stylisé -->
  <g transform="translate(100,108)">
    <!-- Anses du sac -->
    <path d="M -28 -28 Q -28 -52 0 -52 Q 28 -52 28 -28"
          fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>

    <!-- Corps du sac -->
    <rect x="-42" y="-28" width="84" height="68" rx="14" fill="#ffffff"/>

    <!-- Détail / pli central -->
    <rect x="-42" y="-6" width="84" height="6" fill="#10b981" opacity="0.15"/>
  </g>

  <!-- Pastille accent orange -->
  <circle cx="146" cy="56" r="16" fill="#f59e0b"/>
  <path d="M 140 56 L 145 61 L 153 50" stroke="#ffffff" stroke-width="3.5"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
